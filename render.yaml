services:
  - type: web
    name: knowledge-db-api
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: knowledge-db
          property: connectionString
      - key: PORT
        value: 10000

databases:
  - name: knowledge-db
    databaseName: neondb
    user: neondb_owner
