name: Shared PR Check

on:
  workflow_call:
    inputs:
      node-version:
        required: false
        type: string
        default: "22"

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint || true

      - name: Type check
        run: pnpm type-check || true

      - name: Test
        run: pnpm test || true

      - name: Build
        run: pnpm build || true

      - name: Checkout dep-policy
        uses: actions/checkout@v4
        with:
          repository: flipslidersand/dev-infrastructure
          path: .dep-policy
          sparse-checkout: |
            dependency-policy
            scripts/dep-policy-check.py
          sparse-checkout-cone-mode: false

      - name: Dependency policy drift check
        run: |
          pip install pyyaml --quiet --disable-pip-version-check
          python3 .dep-policy/scripts/dep-policy-check.py \
            --policy-dir .dep-policy/dependency-policy || echo "::warning::dependency drift detected"
        continue-on-error: true
